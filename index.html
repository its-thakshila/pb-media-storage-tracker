<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>perabeats Card Log</title>
  <meta name="description" content="Real-time SD card and hard disk custody tracker for perabeats Media Society, University of Peradeniya." />
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <!-- Preconnect for Google Fonts performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ── Toast Container ─────────────────────────────────────── -->
<div id="toast-container" aria-live="polite"></div>

<!-- ── Saving Overlay ──────────────────────────────────────── -->
<div id="saving-overlay" class="saving-overlay" role="status" aria-label="Saving">
  <div class="saving-box">
    <div class="spinner"></div>
    <span>Saving…</span>
  </div>
</div>

<!-- ── Modal ───────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="modal-close" id="modal-close-btn" onclick="Modal.close()" aria-label="Close">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer" class="modal-footer"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     APP SHELL
═════════════════════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── Nav ──────────────────────────────────────────────── -->
  <nav class="app-nav" id="app-nav" style="display:none">
    <div class="container nav-inner">
      <div class="nav-logo">
        <img src="assets/logo.png" alt="perabeats" class="nav-logo-img" />
        <!-- nav-logo-text removed: logo is now a wordmark -->
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" id="tab-home" onclick="Router.show('home')" aria-label="Home">
          <span id="icon-home"></span><span class="tab-label">Home</span>
        </button>
        <button class="nav-tab" id="tab-pending" onclick="Router.show('pending')" aria-label="Pending Actions">
          <span id="icon-bell"></span><span class="tab-label">Pending</span>
          <span class="nav-badge" id="pending-badge" style="display:none">0</span>
        </button>
        <button class="nav-tab" id="tab-history" onclick="Router.show('history')" aria-label="History" style="display:none">
          <span id="icon-clock"></span><span class="tab-label">History</span>
        </button>
      </div>
      <div class="nav-right" style="position:relative">
        <div class="user-chip" id="user-chip" onclick="UI.toggleUserMenu()" aria-haspopup="true">
          <div class="user-avatar" id="user-avatar">?</div>
          <span id="user-name-display">…</span>
          <span id="icon-chevdown"></span>
        </div>
        <!-- User dropdown menu -->
        <div class="user-dropdown" id="user-dropdown" style="display:none">
          <div class="user-dropdown-info">
            <div id="dropdown-name" style="font-weight:600;font-size:.9rem">…</div>
            <div id="dropdown-email" class="text-muted" style="font-size:.78rem">…</div>
            <div id="dropdown-role" class="text-muted" style="font-size:.78rem"></div>
          </div>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item" onclick="UI.signOutConfirm()">
            <span id="icon-logout"></span> Sign Out
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── LOGIN VIEW ────────────────────────────────────────── -->
  <div class="view active" id="view-login">
    <div class="login-card">
      <img src="assets/logo.png" alt="perabeats Logo" class="login-logo" />
      <h1 class="login-title">Card Log</h1>
      <p class="login-subtitle">perabeats Media Society · University of Peradeniya</p>
      <div id="g-signin-btn"></div>
      <!-- Shown while authCheck is in flight after account selection -->
      <div id="login-loading">
        <div class="spinner"></div>
        <span>Signing in…</span>
      </div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ── HOME VIEW ─────────────────────────────────────────── -->
  <div class="view" id="view-home">
    <div class="container view-body">

      <!-- Pending Actions inline panel (shown on home if any) -->
      <div id="pending-home-panel" class="card" style="display:none;margin-bottom:20px;border-left:3px solid var(--status-pending)">
        <div class="section-header">
          <h2 class="section-title">Pending Actions</h2>
          <button class="btn btn-secondary btn-sm" onclick="Router.show('pending')">View All</button>
        </div>
        <div id="pending-home-content"></div>
      </div>

      <!-- Devices -->
      <div class="card">
        <div class="section-header">
          <h2 class="section-title">All Devices</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-secondary btn-sm btn-icon" onclick="HomeView.render(true)" title="Refresh"><span id="icon-refresh"></span></button>
            <button class="btn btn-primary btn-sm admin-only" onclick="HomeView.openAddDevice()">+ Add Device</button>
          </div>
        </div>
        <div id="home-content"></div>
      </div>

      <!-- Admin: Manage Members -->
      <div class="card admin-only hidden" id="admin-panel" style="margin-top:16px">
        <div class="section-header">
          <h2 class="section-title">Admin Controls</h2>
        </div>
        <button class="btn btn-secondary" id="btn-manage-members" onclick="HomeView.openManageMembers()">Manage Members</button>
      </div>

    </div>
  </div>

  <!-- ── PENDING VIEW ──────────────────────────────────────── -->
  <div class="view" id="view-pending">
    <div class="container view-body">
      <div class="card">
        <div class="section-header">
          <h2 class="section-title">Pending Actions</h2>
          <button class="btn btn-secondary btn-sm btn-icon" onclick="PendingView.render()" title="Refresh"><span id="icon-refresh2"></span></button>
        </div>
        <div id="pending-content"></div>
      </div>
    </div>
  </div>

  <!-- ── HISTORY VIEW ──────────────────────────────────────── -->
  <div class="view" id="view-history">
    <div class="container view-body">
      <div style="margin-bottom:16px;display:flex;align-items:center;gap:10px">
        <button class="btn btn-secondary btn-sm" onclick="Router.show('home')">Back</button>
        <h1 class="section-title" id="history-device-label">Device History</h1>
      </div>
      <div class="card">
        <div id="history-content"></div>
      </div>

      <!-- Admin: Correct Log Entry -->
      <div class="admin-only" style="margin-top:16px">
        <button class="btn btn-secondary btn-sm" onclick="AdminView.openCorrectLog()">Add Admin Correction</button>
      </div>
    </div>
  </div>

</div><!-- /.app-shell -->

<!-- ── Scripts ───────────────────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script>
// ── Utility helpers ───────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function firstName(fullName) {
  if (!fullName) return '-';
  const parts = fullName.trim().split(' ');
  return parts[0] + (parts.length > 1 ? ' ' + parts[parts.length-1][0] + '.' : '');
}

// ── UI helpers (dropdown, sign-out) ──────────────────────
const UI = {
  _menuOpen: false,
  toggleUserMenu() {
    const dd = document.getElementById('user-dropdown');
    this._menuOpen = !this._menuOpen;
    dd.style.display = this._menuOpen ? '' : 'none';
  },
  closeUserMenu() {
    this._menuOpen = false;
    const dd = document.getElementById('user-dropdown');
    if (dd) dd.style.display = 'none';
  },
  signOutConfirm() {
    this.closeUserMenu();
    Auth.signOut(Router.showLogin);
  }
};
// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('#user-chip') && !e.target.closest('#user-dropdown')) {
    UI.closeUserMenu();
  }
});

// ── Mobile: prevent pinch-zoom + double-tap zoom (iOS ignores user-scalable=no) ──
document.addEventListener('touchstart', (e) => {
  if (e.touches.length > 1) e.preventDefault(); // block pinch
}, { passive: false });
let _lastTap = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault(); // block double-tap zoom
  _lastTap = now;
}, { passive: false });

function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const date = new Date(isoStr);
  const diff  = Date.now() - date.getTime();
  const mins  = Math.floor(diff / 60000);
  if (mins < 1)   return 'Just now';
  if (mins < 60)  return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)   return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'Yesterday';
  if (days < 7)   return days + ' days ago';
  return date.toLocaleDateString('en-LK', { day:'numeric', month:'short' });
}

function formatTimestamp(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleString('en-LK', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
}

// ── Toast ─────────────────────────────────────────────────
const Toast = {
  show(msg, type = 'info') {
    const el  = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
};

// ── Saving overlay ────────────────────────────────────────
const Saving = {
  show() { document.getElementById('saving-overlay').classList.add('visible'); },
  hide() { document.getElementById('saving-overlay').classList.remove('visible'); }
};

// ── Modal ─────────────────────────────────────────────────
const Modal = {
  open({ title, body, footer }) {
    document.getElementById('modal-title').textContent  = title;
    document.getElementById('modal-body').innerHTML     = body;
    document.getElementById('modal-footer').innerHTML   = footer;
    document.getElementById('modal-overlay').classList.add('open');
  },
  close() {
    document.getElementById('modal-overlay').classList.remove('open');
  }
};
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) Modal.close();
});

// ── Router ────────────────────────────────────────────────
const Router = {
  _current: 'login',
  show(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const el = document.getElementById('view-' + view);
    if (el) el.classList.add('active');
    const tab = document.getElementById('tab-' + view);
    if (tab) tab.classList.add('active');
    // Show history tab when history is visible
    document.getElementById('tab-history').style.display = view === 'history' ? '' : 'none';
    Router._current = view;
    if (view === 'home')    HomeView.render();
    if (view === 'pending') PendingView.render();
  },
  showLogin() {
    document.getElementById('app-nav').style.display = 'none';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-login').classList.add('active');
    document.body.classList.remove('is-admin');
    Router._current = 'login';
  }
};
</script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/views/home.js"></script>
<script src="js/views/pending.js"></script>
<script src="js/views/history.js"></script>
<script src="js/views/update.js"></script>
<script>
// ── Admin: Correct Log Entry ──────────────────────────────
const AdminView = {
  openCorrectLog() {
    const label = document.getElementById('history-device-label').textContent;
    Modal.open({
      title: '🔧 Admin Correction',
      body: `
        <p class="text-muted" style="font-size:.875rem;margin-bottom:16px">
          Enter the Transaction ID to flag, and a correction note. The original row is never modified — a new row is appended.
        </p>
        <div class="form-group">
          <label class="form-label">Transaction ID to correct</label>
          <input id="ac-txnid" class="form-control" placeholder="TXN-00001" />
        </div>
        <div class="form-group">
          <label class="form-label">Correction Note</label>
          <textarea id="ac-note" class="form-control" rows="3" placeholder="What was wrong and what the correct information is"></textarea>
        </div>`,
      footer: `<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>
               <button class="btn btn-primary" onclick="AdminView.submitCorrectLog()">Submit Correction</button>`
    });
  },
  async submitCorrectLog() {
    const transactionId  = document.getElementById('ac-txnid').value.trim();
    const correctionNote = document.getElementById('ac-note').value.trim();
    if (!transactionId || !correctionNote) { Toast.show('Fill in all fields.', 'error'); return; }
    try {
      Saving.show();
      await API.correctLogEntry({ transactionId, correctionNote });
      Toast.show('Correction logged.', 'success');
      Modal.close();
    } catch (err) {
      Toast.show(err.message, 'error');
    } finally {
      Saving.hide();
    }
  }
};

// ── App Bootstrap ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Inject nav icons after DOM ready
  const iconMap = {
    'icon-home':     Icons.home(),
    'icon-bell':     Icons.bell(),
    'icon-clock':    Icons.clock(),
    'icon-chevdown': Icons.chevDown(),
    'icon-refresh':  Icons.refresh(),
    'icon-refresh2': Icons.refresh(),
    'icon-logout':   Icons.logout(),
  };
  Object.entries(iconMap).forEach(([id, svg]) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = svg;
  });

  // Admin controls icon
  const mmBtn = document.getElementById('btn-manage-members');
  if (mmBtn) mmBtn.innerHTML = Icons.users() + ' Manage Members';

  // Check for existing session
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    _onLoginSuccess(user);
  } else {
    Auth.initSignIn(
      (user) => _onLoginSuccess(user),
      (errMsg) => {
        const errEl = document.getElementById('login-error');
        errEl.textContent = errMsg;
        errEl.classList.add('visible');
      }
    );
  }
});

function _onLoginSuccess(user) {
  document.getElementById('app-nav').style.display = '';
  document.getElementById('user-name-display').textContent = user.name.split(' ')[0];
  document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
  // Populate dropdown
  document.getElementById('dropdown-name').textContent  = user.name;
  document.getElementById('dropdown-email').textContent = user.email;
  document.getElementById('dropdown-role').textContent  = user.role + (user.title ? ' - ' + user.title : '');
  if (user.role === 'Admin') document.body.classList.add('is-admin');
  Router.show('home');
  PendingView.render();
}
</script>
</body>
</html>
